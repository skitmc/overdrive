<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKITMC | INFINITY CLICKER</title>
    <style>
        :root {
            --bg: #0a0f1e;
            --panel: #161b2d;
            --accent: #f59e0b; 
            --click-neon: #06b6d4;
            --text: #f8fafc;
            --success: #22c55e;
            --border: #2d3748;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        header {
            background: var(--panel);
            padding: 15px 30px;
            border-bottom: 2px solid var(--accent);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .level-box { flex: 1; max-width: 600px; margin: 0 40px; }
        .progress-container { height: 12px; background: #020617; border-radius: 10px; margin-top: 5px; border: 1px solid var(--border); overflow: hidden; }
        #progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #f59e0b, #fbbf24); transition: width 0.3s; }

        main { display: flex; flex: 1; overflow: hidden; }

        .click-zone {
            flex: 1.2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #1e293b 0%, #0a0f1e 100%);
            border-right: 1px solid var(--border);
            position: relative;
        }

        #score-display { font-size: 5rem; font-weight: 900; color: #fff; text-shadow: 0 0 20px rgba(6, 182, 212, 0.3); }
        #pps-display { font-size: 1.2rem; color: var(--click-neon); margin-bottom: 30px; font-weight: 600; min-height: 1.5em; }

        #main-btn {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            border: 10px solid var(--click-neon);
            background: var(--panel);
            cursor: pointer;
            font-size: 7rem;
            transition: transform 0.05s;
            box-shadow: 0 0 40px rgba(6, 182, 212, 0.2);
            user-select: none;
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }
        #main-btn:active { transform: scale(0.92); }

        .floating-text {
            position: absolute;
            color: var(--click-neon);
            font-weight: bold;
            pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
            z-index: 1000;
        }

        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-100px); opacity: 0; }
        }

        .shop-zone { flex: 1; background: var(--panel); display: flex; flex-direction: column; }
        .shop-tabs { padding: 20px; border-bottom: 1px solid var(--border); font-weight: bold; letter-spacing: 1px; color: var(--accent); }
        
        #upgrade-list { flex: 1; overflow-y: scroll; padding: 15px; }
        #upgrade-list::-webkit-scrollbar { width: 8px; }
        #upgrade-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .item {
            background: #1e293b;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid transparent;
        }
        .item:hover:not(.locked) { background: #2d3748; border-color: var(--click-neon); transform: translateX(-3px); }
        .item.locked { opacity: 0.3; cursor: not-allowed; filter: grayscale(1); }
        .item.special { border: 2px solid var(--accent); }

        .item-text h4 { font-size: 1rem; color: #fff; }
        .item-text p { font-size: 0.75rem; color: #94a3b8; }
        .item-cost { font-weight: 800; color: var(--success); font-size: 1.1rem; }

        footer { background: #020617; padding: 10px 25px; display: flex; justify-content: space-between; font-size: 0.8rem; color: #64748b; }
        .rebirth-btn { background: var(--accent); color: #000; border: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; display: none; }
    </style>
</head>
<body>

<header>
    <div><strong>SKITMC</strong> <small>v4.1</small></div>
    <div class="level-box">
        <div style="display: flex; justify-content: space-between; font-size: 0.8rem;">
            <span id="lvl-txt">LEVEL 1</span>
            <span id="xp-txt">0 / 100 XP</span>
        </div>
        <div class="progress-container"><div id="progress-fill"></div></div>
    </div>
    <button class="rebirth-btn" id="rebirth-btn" onclick="prestige()">REBIRTH</button>
</header>

<main>
    <section class="click-zone" id="click-zone">
        <div id="score-display">0</div>
        <div id="pps-display">0.0 TOTAL INCOME / SEC</div>
        <button id="main-btn">💎</button>
    </section>

    <section class="shop-zone">
        <div class="shop-tabs">ULTIMATE SHOP</div>
        <div id="upgrade-list"></div>
    </section>
</main>

<footer>
    <span>PER CLICK: <span id="stat-ppc">1</span></span>
    <span>MULTIPLIER: <span id="stat-mult">1x</span></span>
    <button onclick="localStorage.clear(); location.reload();" style="background:none; border:none; color:#444; cursor:pointer;">Reset</button>
</footer>

<script>
    let score = 0;
    let totalEarned = 0;
    let prestigeLevel = 0;
    let level = 1;

    const catalog = [
        { name: "Personal Hand", type: 'click', cost: 15, power: 1, rate: 3.0, desc: "Hand-crafted clicking power.", special: true },
        { name: "Task Script", type: 'auto', cost: 50, power: 1, rate: 1.15, desc: "A basic background process." },
        { name: "Gaming Mouse", type: 'click', cost: 600, power: 12, rate: 3.5, desc: "Razer-fast response times.", special: true },
        { name: "Skit Server", type: 'auto', cost: 1200, power: 10, rate: 1.15, desc: "Dedicated hosting power." },
        { name: "Data Farm", type: 'auto', cost: 5000, power: 55, rate: 1.16, desc: "A room full of machines." },
        { name: "Neural Bot", type: 'auto', cost: 25000, power: 240, rate: 1.17, desc: "AI that learns to click." },
        { name: "Satellite Link", type: 'auto', cost: 150000, power: 1100, rate: 1.18, desc: "Orbital point generation." },
        { name: "Quantum Rig", type: 'auto', cost: 1000000, power: 6000, rate: 1.19, desc: "Computing across dimensions." },
        { name: "Reality Core", type: 'auto', cost: 10000000, power: 45000, rate: 1.20, desc: "Bending physics for points." }
    ];

    let owned = new Array(catalog.length).fill(0);

    function init() {
        load();
        setInterval(gameTick, 100); 
        setInterval(save, 5000);
        renderShop();
    }

    function gameTick() {
        let mult = (1 + (level - 1) * 0.05) * Math.pow(2, prestigeLevel);
        let ppsBase = 0;
        catalog.forEach((u, i) => { if(u.type === 'auto') ppsBase += (u.power * owned[i]); });
        
        let gain = (ppsBase * mult) / 10;
        score += gain;
        totalEarned += gain;
        
        checkLevel();
        updateUI(mult, ppsBase);
    }

    document.getElementById('main-btn').addEventListener('click', (e) => {
        let mult = (1 + (level - 1) * 0.05) * Math.pow(2, prestigeLevel);
        let ppcBase = 1;
        catalog.forEach((u, i) => { if(u.type === 'click') ppcBase += (u.power * owned[i]); });
        
        let clickVal = ppcBase * mult;
        score += clickVal;
        totalEarned += clickVal;
        
        spawnFloatingText(e.clientX, e.clientY, clickVal);
        updateUI(mult);
        renderShop();
    });

    function spawnFloatingText(x, y, val) {
        const text = document.createElement('div');
        text.className = 'floating-text';
        text.innerText = '+' + Math.floor(val).toLocaleString();
        text.style.left = x + 'px';
        text.style.top = y + 'px';
        document.body.appendChild(text);
        setTimeout(() => text.remove(), 800);
    }

    function buy(i) {
        let u = catalog[i];
        let cost = Math.floor(u.cost * Math.pow(u.rate, owned[i]));
        if (score >= cost) {
            score -= cost;
            owned[i]++;
            renderShop();
            updateUI();
        }
    }

    function checkLevel() {
        let next = 100 * Math.pow(level, 2.3);
        if (totalEarned >= next) level++;
        document.getElementById('rebirth-btn').style.display = (level >= 12) ? 'block' : 'none';
    }

    function updateUI(mult = 1, pps = 0) {
        document.getElementById('score-display').innerText = Math.floor(score).toLocaleString();
        document.getElementById('pps-display').innerText = (pps * mult).toLocaleString() + " TOTAL INCOME / SEC";
        
        let ppcBase = 1;
        catalog.forEach((u, i) => { if(u.type === 'click') ppcBase += (u.power * owned[i]); });
        document.getElementById('stat-ppc').innerText = (ppcBase * mult).toLocaleString();
        document.getElementById('stat-mult').innerText = mult.toFixed(1) + "x";

        let currentLvlBase = 100 * Math.pow(level - 1, 2.3);
        let nextLvlReq = 100 * Math.pow(level, 2.3);
        let progress = ((totalEarned - currentLvlBase) / (nextLvlReq - currentLvlBase)) * 100;
        document.getElementById('lvl-txt').innerText = "LEVEL " + level;
        document.getElementById('xp-txt').innerText = Math.floor(totalEarned).toLocaleString() + " / " + Math.floor(nextLvlReq).toLocaleString() + " XP";
        document.getElementById('progress-fill').style.width = progress + "%";
    }

    function renderShop() {
        const container = document.getElementById('upgrade-list');
        container.innerHTML = '';
        catalog.forEach((u, i) => {
            let cost = Math.floor(u.cost * Math.pow(u.rate, owned[i]));
            let canAfford = score >= cost;
            let item = document.createElement('div');
            item.className = `item ${!canAfford ? 'locked' : ''} ${u.special ? 'special' : ''}`;
            item.onclick = () => buy(i);
            item.innerHTML = `
                <div class="item-text">
                    <h4>${u.name} [Lv.${owned[i]}]</h4>
                    <p>${u.desc}</p>
                </div>
                <div class="item-cost">${cost.toLocaleString()}</div>
            `;
            container.appendChild(item);
        });
    }

    function prestige() {
        if (confirm("REBIRTH? Everything resets but you get x2 Multiplier!")) {
            prestigeLevel++;
            score = 0;
            owned = new Array(catalog.length).fill(0);
            save();
            location.reload();
        }
    }

    function save() {
        localStorage.setItem('skitmc_final', JSON.stringify({score, totalEarned, owned, level, prestigeLevel}));
    }

    function load() {
        let raw = localStorage.getItem('skitmc_final');
        if (raw) {
            let d = JSON.parse(raw);
            score = d.score || 0;
            totalEarned = d.totalEarned || 0;
            owned = d.owned || owned;
            level = d.level || 1;
            prestigeLevel = d.prestigeLevel || 0;
        }
    }

    init();
</script>
</body>
</html>
