<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKITMC | INFINITY CLICKER</title>
    <style>
        :root {
            --bg: #0a0f1e;
            --panel: #161b2d;
            --accent: #f59e0b; 
            --click-neon: #06b6d4;
            --text: #f8fafc;
            --success: #22c55e;
            --border: #2d3748;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Professional Header */
        header {
            background: var(--panel);
            padding: 15px 30px;
            border-bottom: 2px solid var(--accent);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .level-box { flex: 1; max-width: 600px; margin: 0 40px; }
        .progress-container { height: 12px; background: #020617; border-radius: 10px; margin-top: 5px; border: 1px solid var(--border); overflow: hidden; }
        #progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #f59e0b, #fbbf24); transition: width 0.3s; }

        main { display: flex; flex: 1; overflow: hidden; }

        /* Left Side: Interaction */
        .click-zone {
            flex: 1.2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #1e293b 0%, #0a0f1e 100%);
            border-right: 1px solid var(--border);
        }

        #score-display { font-size: 5rem; font-weight: 900; color: #fff; text-shadow: 0 0 20px rgba(6, 182, 212, 0.3); }
        #pps-display { font-size: 1.2rem; color: var(--click-neon); margin-bottom: 30px; font-weight: 600; }

        #main-btn {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            border: 10px solid var(--click-neon);
            background: var(--panel);
            cursor: pointer;
            font-size: 7rem;
            transition: transform 0.05s, box-shadow 0.2s;
            box-shadow: 0 0 40px rgba(6, 182, 212, 0.2);
            user-select: none;
            display: flex; align-items: center; justify-content: center;
        }
        #main-btn:active { transform: scale(0.92); box-shadow: 0 0 60px rgba(6, 182, 212, 0.4); }

        /* Right Side: Mega Shop */
        .shop-zone { flex: 1; background: var(--panel); display: flex; flex-direction: column; }
        .shop-tabs { padding: 20px; border-bottom: 1px solid var(--border); font-weight: bold; letter-spacing: 1px; color: var(--accent); }
        
        #upgrade-list { flex: 1; overflow-y: scroll; padding: 15px; }
        #upgrade-list::-webkit-scrollbar { width: 8px; }
        #upgrade-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .item {
            background: #1e293b;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid transparent;
        }
        .item:hover:not(.locked) { background: #2d3748; border-color: var(--click-neon); transform: translateX(-3px); }
        .item.locked { opacity: 0.3; cursor: not-allowed; filter: grayscale(1); }
        .item.special { border: 2px solid var(--accent); box-shadow: 0 0 10px rgba(245, 158, 11, 0.2); }

        .item-text h4 { font-size: 1rem; color: #fff; }
        .item-text p { font-size: 0.75rem; color: #94a3b8; }
        .item-cost { font-weight: 800; color: var(--success); font-size: 1.1rem; }

        /* Footer */
        footer { background: #020617; padding: 10px 25px; display: flex; justify-content: space-between; font-size: 0.8rem; color: #64748b; }

        .rebirth-btn {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            display: none;
        }
    </style>
</head>
<body>

<header>
    <div><strong>SKITMC</strong> <small id="version">v4.0</small></div>
    <div class="level-box">
        <div style="display: flex; justify-content: space-between; font-size: 0.8rem;">
            <span id="lvl-txt">LEVEL 1</span>
            <span id="xp-txt">0 / 100 XP</span>
        </div>
        <div class="progress-container"><div id="progress-fill"></div></div>
    </div>
    <button class="rebirth-btn" id="rebirth-btn" onclick="prestige()">REBIRTH</button>
</header>

<main>
    <section class="click-zone">
        <div id="score-display">0</div>
        <div id="pps-display">0.0 PER SECOND</div>
        <button id="main-btn">🔘</button>
    </section>

    <section class="shop-zone">
        <div class="shop-tabs">PURCHASABLE UPGRADES</div>
        <div id="upgrade-list"></div>
    </section>
</main>

<footer>
    <span>PPC: <span id="stat-ppc">1</span></span>
    <span>TOTAL CAREER: <span id="stat-total">0</span></span>
    <span>MULTIPLIER: <span id="stat-mult">1x</span></span>
</footer>

<script>
    let score = 0;
    let totalEarned = 0;
    let prestigeLevel = 0;
    let level = 1;

    // A LOT of purchasable things
    const catalog = [
        { name: "Super Finger", type: 'click', cost: 15, power: 1, rate: 3.0, desc: "Hand-crafted clicking power.", special: true },
        { name: "Auto-Clicker", type: 'auto', cost: 50, power: 1, rate: 1.15, desc: "A basic mouse macro." },
        { name: "Double Mouse", type: 'click', cost: 500, power: 15, rate: 3.5, desc: "Two mice, one hand.", special: true },
        { name: "Skit Bot", type: 'auto', cost: 600, power: 8, rate: 1.15, desc: "An automated clicking script." },
        { name: "Server Blade", type: 'auto', cost: 3000, power: 40, rate: 1.15, desc: "Rack-mounted processing." },
        { name: "Click Farm", type: 'auto', cost: 15000, power: 150, rate: 1.16, desc: "A room full of clicking devices." },
        { name: "Neural Link", type: 'auto', cost: 100000, power: 850, rate: 1.17, desc: "Think and it clicks." },
        { name: "Data Center", type: 'auto', cost: 500000, power: 3000, rate: 1.18, desc: "Industrial grade output." },
        { name: "Satellite Relay", type: 'auto', cost: 2500000, power: 12000, rate: 1.19, desc: "Orbital clicking technology." },
        { name: "Reality Warper", type: 'auto', cost: 15000000, power: 55000, rate: 1.20, desc: "Clicks don't exist, only points." }
    ];

    let owned = new Array(catalog.length).fill(0);

    function init() {
        load();
        setInterval(gameTick, 100);
        setInterval(save, 5000);
        updateUI();
        renderShop();
    }

    function gameTick() {
        let mult = (1 + (level - 1) * 0.05) * Math.pow(2, prestigeLevel);
        let pps = 0;
        catalog.forEach((u, i) => { if(u.type === 'auto') pps += (u.power * owned[i]); });
        
        let gain = (pps * mult) / 10;
        score += gain;
        totalEarned += gain;
        
        checkLevel();
        updateUI(mult, pps);
    }

    document.getElementById('main-btn').addEventListener('click', () => {
        let mult = (1 + (level - 1) * 0.05) * Math.pow(2, prestigeLevel);
        let ppc = 1;
        catalog.forEach((u, i) => { if(u.type === 'click') ppc += (u.power * owned[i]); });
        
        let clickGain = ppc * mult;
        score += clickGain;
        totalEarned += clickGain;
        updateUI(mult);
        renderShop();
    });

    function buy(i) {
        let u = catalog[i];
        let cost = Math.floor(u.cost * Math.pow(u.rate, owned[i]));
        if (score >= cost) {
            score -= cost;
            owned[i]++;
            renderShop();
            updateUI();
        }
    }

    function checkLevel() {
        let next = 100 * Math.pow(level, 2.5);
        if (totalEarned >= next) level++;
        document.getElementById('rebirth-btn').style.display = (level >= 15) ? 'block' : 'none';
    }

    function updateUI(mult = 1, pps = 0) {
        document.getElementById('score-display').innerText = Math.floor(score).toLocaleString();
        document.getElementById('pps-display').innerText = (pps * mult).toFixed(1) + " PER SECOND";
        
        // Stats
        let ppc = 1;
        catalog.forEach((u, i) => { if(u.type === 'click') ppc += (u.power * owned[i]); });
        document.getElementById('stat-ppc').innerText = (ppc * mult).toFixed(1);
        document.getElementById('stat-total').innerText = Math.floor(totalEarned).toLocaleString();
        document.getElementById('stat-mult').innerText = mult.toFixed(1) + "x";

        // Level Bar
        let currentLvlBase = 100 * Math.pow(level - 1, 2.5);
        let nextLvlReq = 100 * Math.pow(level, 2.5);
        let progress = ((totalEarned - currentLvlBase) / (nextLvlReq - currentLvlBase)) * 100;
        document.getElementById('lvl-txt').innerText = "LEVEL " + level;
        document.getElementById('xp-txt').innerText = Math.floor(totalEarned).toLocaleString() + " / " + Math.floor(nextLvlReq).toLocaleString() + " XP";
        document.getElementById('progress-fill').style.width = progress + "%";
    }

    function renderShop() {
        const container = document.getElementById('upgrade-list');
        container.innerHTML = '';
        catalog.forEach((u, i) => {
            let cost = Math.floor(u.cost * Math.pow(u.rate, owned[i]));
            let canAfford = score >= cost;
            let item = document.createElement('div');
            item.className = `item ${!canAfford ? 'locked' : ''} ${u.special ? 'special' : ''}`;
            item.onclick = () => buy(i);
            item.innerHTML = `
                <div class="item-text">
                    <h4>${u.name} [Lv.${owned[i]}]</h4>
                    <p>${u.desc}</p>
                </div>
                <div class="item-cost">${cost.toLocaleString()}</div>
            `;
            container.appendChild(item);
        });
    }

    function prestige() {
        if (confirm("Rebirth? Score and upgrades reset, but you gain a permanent x2 speed!")) {
            prestigeLevel++;
            score = 0;
            owned = new Array(catalog.length).fill(0);
            save();
            location.reload();
        }
    }

    function save() {
        localStorage.setItem('skitmc_v4', JSON.stringify({score, totalEarned, owned, level, prestigeLevel}));
    }

    function load() {
        let raw = localStorage.getItem('skitmc_v4');
        if (raw) {
            let d = JSON.parse(raw);
            score = d.score || 0;
            totalEarned = d.totalEarned || 0;
            owned = d.owned || owned;
            level = d.level || 1;
            prestigeLevel = d.prestigeLevel || 0;
        }
    }

    init();
</script>
</body>
</html>
