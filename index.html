<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OVERDRIVE</title>
    <link rel="icon" type="image/png" href="assets/clicker.png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030305;
            --panel: rgba(10, 10, 15, 0.98);
            --yellow: #ffcc00;
            --orange: #ff6600;
            --green: #00ff66;
            --border: #1a1a1a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        
        body { 
            background: var(--bg); color: #fff; font-family: 'Orbitron', sans-serif;
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        canvas { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 100; }

        header {
            background: var(--panel); padding: 0 40px; border-bottom: 1px solid #222;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 10; height: 65px;
        }

        .main-title {
            font-size: 1.5rem; font-weight: 900; text-transform: uppercase;
            background: linear-gradient(to bottom, var(--yellow), var(--orange));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: 6px;
        }

        .header-stats { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        .battery-row { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
        .level-badge {
            background: var(--orange); color: #000; padding: 2px 8px;
            font-weight: 900; font-size: 0.8rem; border-radius: 2px;
        }

        .battery-container {
            width: 280px; height: 12px; border: 1px solid #333;
            background: #000; position: relative; overflow: hidden;
        }
        #battery-fill {
            height: 100%; width: 0%; background: var(--yellow);
            box-shadow: 0 0 10px var(--orange); transition: width 0.4s ease;
        }
        
        .rebirth-tracker { font-size: 0.6rem; color: #777; letter-spacing: 1px; font-family: 'JetBrains Mono'; }

        #settings-toggle { font-size: 1.2rem; cursor: pointer; color: var(--yellow); }

        #settings-menu {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--panel); border: 2px solid var(--orange); padding: 25px;
            z-index: 300; display: none; width: 320px; box-shadow: 0 0 50px #000;
        }

        /* Dev Menu Styles */
        #dev-menu {
            position: fixed; top: 20px; left: 20px; background: rgba(0, 20, 0, 0.9);
            border: 2px solid var(--green); padding: 15px; z-index: 400; display: none;
            box-shadow: 0 0 20px rgba(0, 255, 102, 0.2); border-radius: 5px;
        }
        .dev-btn {
            display: block; width: 100%; margin-bottom: 8px; padding: 8px;
            background: #003311; color: var(--green); border: 1px solid var(--green);
            font-family: 'JetBrains Mono'; cursor: pointer; font-weight: 900;
        }
        .dev-btn:hover { background: var(--green); color: #000; }

        main { display: flex; flex: 1; overflow: hidden; z-index: 5; }

        .reactor-section {
            flex: 1.5; display: flex; flex-direction: column;
            align-items: center; justify-content: center; position: relative;
            border-right: 1px solid var(--border);
        }

        #score-text { 
            font-size: 5.5rem; font-weight: 900; color: #fff;
            text-shadow: 0 0 20px var(--orange); font-family: 'JetBrains Mono';
            margin-bottom: -5px;
        }
        #pps-text { color: var(--yellow); font-size: 1rem; margin-bottom: 20px; opacity: 0.7; }

        .core-wrapper {
            position: relative; width: 280px; height: 280px;
            cursor: pointer; transition: transform 0.05s; margin-bottom: 30px;
        }
        .core-wrapper:active { transform: scale(0.94); }
        .core-wrapper img { width: 100%; height: 100%; filter: drop-shadow(0 0 20px var(--orange)); }

        #rebirth-btn {
            padding: 12px 30px; font-family: 'Orbitron'; font-weight: 900; font-size: 0.9rem;
            letter-spacing: 2px; transition: 0.3s; border: 1px solid; text-transform: uppercase;
        }
        #rebirth-btn.locked { background: transparent; color: #444; border-color: #333; cursor: not-allowed; }
        #rebirth-btn.ready {
            background: rgba(255, 102, 0, 0.1); color: var(--yellow); border-color: var(--orange);
            cursor: pointer; box-shadow: 0 0 15px rgba(255, 102, 0, 0.3); animation: pulse 2s infinite;
        }
        #rebirth-btn.ready:hover { background: var(--orange); color: #000; }
        @keyframes pulse { 0% { box-shadow: 0 0 15px rgba(255,102,0,0.3); } 50% { box-shadow: 0 0 25px rgba(255,204,0,0.6); } 100% { box-shadow: 0 0 15px rgba(255,102,0,0.3); } }

        .shop-section { flex: 1; background: #08080a; display: flex; flex-direction: column; }
        
        .shop-header {
            padding: 15px 20px; background: #000; border-bottom: 1px solid var(--orange);
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;
        }
        .shop-title { color: var(--orange); font-weight: 900; font-size: 0.85rem; letter-spacing: 2px; width: 100%; text-align: center; }
        .buy-toggles { display: flex; gap: 5px; }
        .buy-btn {
            background: #111; color: #666; border: 1px solid #333; padding: 4px 10px;
            font-family: 'JetBrains Mono'; font-weight: 900; cursor: pointer; transition: 0.2s;
        }
        .buy-btn.active.mode-buy { background: var(--orange); color: #000; border-color: var(--yellow); }
        .buy-btn.active.mode-sell { background: var(--green); color: #000; border-color: #fff; }
        .buy-btn:hover:not(.active) { background: #222; color: #fff; }

        #upgrade-list { flex: 1; overflow-y: auto; padding: 15px; }

        .item {
            background: #0d0d12; border: 1px solid #1a1a1a; padding: 14px;
            margin-bottom: 8px; display: flex; justify-content: space-between;
            align-items: center; cursor: pointer; transition: 0.2s;
        }
        .item:hover:not(.locked) { border-color: var(--yellow); background: #14141c; transform: translateX(-2px); }
        .item.sell-mode:hover:not(.locked) { border-color: var(--green); background: #0a140f; }
        .item.locked { opacity: 0.15; cursor: not-allowed; }
        
        .item-info h4 { font-size: 0.85rem; color: var(--yellow); }
        .item-info p { font-size: 0.65rem; color: #555; }
        .item-cost-display { text-align: right; }
        .item-cost-display span { display: block; font-size: 0.6rem; color: #666; margin-top: 2px; }

        .pop {
            position: absolute; pointer-events: none; color: var(--yellow);
            font-weight: 900; font-size: 1.8rem; z-index: 101;
            font-family: 'JetBrains Mono'; animation: float 0.7s ease-out forwards;
        }
        @keyframes float { 0% { opacity:1; transform:translateY(0); } 100% { opacity:0; transform:translateY(-120px); } }

        footer {
            background: #000; padding: 0 40px; height: 45px;
            border-top: 1px solid #111; display: flex;
            justify-content: space-between; align-items: center;
            font-size: 0.7rem; color: #444;
        }
        .dev-portal { background: #fff; color: #000; padding: 4px 12px; text-decoration: none; font-weight: 900; }

        .shake { animation: shakeAnim 0.1s linear 2; }
        @keyframes shakeAnim { 0% { transform: translate(2px, 2px); } 50% { transform: translate(-2px, -2px); } 100% { transform: translate(0, 0); } }
    </style>
</head>
<body>

<canvas id="lightning"></canvas>

<div id="dev-menu">
    <h3 style="color:var(--green); margin-bottom:15px; text-align:center; font-size:0.9rem; letter-spacing:2px;">DEV OVERRIDE</h3>
    <button class="dev-btn" onclick="cheatMult()">x1000 WATTS</button>
    <button class="dev-btn" onclick="cheatBuyAll()">BUY 10 ALL</button>
    <button class="dev-btn" onclick="cheatSellAll()">SELL 10 ALL</button>
    <button class="dev-btn" style="background:transparent; color:#888; border-color:#555; margin-top:10px;" onclick="document.getElementById('dev-menu').style.display='none'">HIDE PANEL</button>
</div>

<div id="settings-menu">
    <h3 style="color:var(--orange); margin-bottom: 20px; text-align: center;">SYSTEM</h3>
    <button onclick="enterCode()" style="width:100%; background:#1a1a1a; color:#fff; border:1px solid #333; padding:8px; cursor:pointer; font-weight:900; margin-bottom: 15px; font-family:'JetBrains Mono';">ENTER OVERRIDE CODE</button>
    <div style="display:flex; justify-content:space-between; margin-bottom:15px;"><span>Visual FX</span><input type="checkbox" id="anim-toggle" checked></div>
    <div style="display:flex; justify-content:space-between; margin-bottom:15px;"><span>Background Music</span><input type="checkbox" id="music-toggle" onchange="updateMusic()"></div>
    <div style="display:flex; justify-content:space-between; margin-bottom:15px;"><span>Purchase SFX</span><input type="checkbox" id="sfx-toggle" checked></div>
    <button onclick="toggleSettings()" style="width:100%; background:var(--yellow); border:none; padding:10px; cursor:pointer; font-weight:900;">BACK</button>
</div>

<header>
    <div class="main-title">OVERDRIVE</div>
    <div class="header-stats">
        <div class="battery-row">
            <div class="level-badge">LVL <span id="level-num">1</span></div>
            <div class="battery-container">
                <div id="battery-fill"></div>
            </div>
        </div>
        <div class="rebirth-tracker">LEVELS REQUIRED TO REBIRTH: <span style="color: var(--orange)">100</span></div>
    </div>
    <div id="settings-toggle" onclick="toggleSettings()">⚙️</div>
</header>

<main>
    <section class="reactor-section" id="shake-target">
        <div id="score-text">0</div>
        <div id="pps-text">0.0 WATTS / SEC</div>
        
        <div class="core-wrapper" id="core-btn">
            <img src="assets/clicker.png" id="core-img">
        </div>
        
        <div id="rebirth-btn" class="locked" onclick="prestige()">SYSTEM REBIRTH [LOCKED]</div>
    </section>

    <section class="shop-section">
        <div class="shop-header">
            <div class="shop-title">SUBSYSTEMS</div>
            <div class="buy-toggles">
                <button class="buy-btn active mode-buy" id="mode-buy" onclick="setShopMode('buy')">BUY</button>
                <button class="buy-btn mode-sell" id="mode-sell" onclick="setShopMode('sell')">SELL</button>
            </div>
            <div class="buy-toggles">
                <button class="buy-btn active mode-buy" id="btn-1x" onclick="setBuyAmount(1)">1x</button>
                <button class="buy-btn mode-buy" id="btn-5x" onclick="setBuyAmount(5)">5x</button>
                <button class="buy-btn mode-buy" id="btn-10x" onclick="setBuyAmount(10)">10x</button>
            </div>
        </div>
        <div id="upgrade-list"></div>
    </section>
</main>

<footer>
    <div>MULTIPLIER: <span id="stat-mult" style="color:var(--orange)">1x</span> | AUTO: <span id="stat-pps">0</span> | MANUAL: <span id="stat-ppc">1</span></div>
    <div style="display:flex; align-items:center; gap:15px;">
        <span>LEARN MORE ABOUT THE DEVELOPER:</span>
        <a href="https://skitmc.github.io/" target="_blank" class="dev-portal">DEVELOPER</a>
    </div>
</footer>

<script>
    let watts = 0, totalEver = 0, level = 1, rebirths = 0;
    let buyAmount = 1; 
    let shopMode = 'buy'; // 'buy' or 'sell'
    
    const canvas = document.getElementById('lightning');
    const ctx = canvas.getContext('2d');
    
    const bgMusic = new Audio('sounds/backround_sound.mp3');
    bgMusic.loop = true;
    const buySfx = new Audio('sounds/purcahsesucsess.mp3');

    const catalog = [
        { name: "Copper Link", type: "click", cost: 15, power: 1, rate: 3.0, desc: "Improves manual flow." },
        { name: "Lemon Cell", type: "auto", cost: 50, power: 1, rate: 1.15, desc: "Chemical acid draw." },
        { name: "Static Plate", type: "auto", cost: 400, power: 6, rate: 1.15, desc: "Harvesting friction." },
        { name: "Coil Injector", type: "click", cost: 1200, power: 12, rate: 3.5, desc: "Heavy pulse clicks." },
        { name: "Solar Grid", type: "auto", cost: 2000, power: 25, rate: 1.16, desc: "Photon capture." },
        { name: "Wind Array", type: "auto", cost: 10000, power: 80, rate: 1.17, desc: "Harness the gale." },
        { name: "Coal Boiler", type: "auto", cost: 60000, power: 400, rate: 1.18, desc: "Old world burning." },
        { name: "Nuclear Hub", type: "auto", cost: 250000, power: 1800, rate: 1.19, desc: "Atomic stability." },
        { name: "Fusion Core", type: "auto", cost: 1000000, power: 8500, rate: 1.2, desc: "Solar mimicry." },
        { name: "Dyson Swarm", type: "auto", cost: 8000000, power: 45000, rate: 1.21, desc: "Total star harvest." }
    ];

    let owned = new Array(catalog.length).fill(0);

    function format(n) {
        if (n < 1000) return Math.floor(n);
        let s = ["K", "M", "B", "T", "Qa", "Qi", "Sx"];
        let e = Math.floor(Math.log10(n) / 3);
        return (n / Math.pow(1000, e)).toFixed(1) + s[e-1];
    }

    function toggleSettings() {
        const m = document.getElementById('settings-menu');
        m.style.display = m.style.display === 'block' ? 'none' : 'block';
    }

    function updateMusic() {
        if(document.getElementById('music-toggle').checked) bgMusic.play().catch(()=>{});
        else bgMusic.pause();
    }

    function enterCode() {
        let code = prompt("ENTER SYSTEM OVERRIDE CODE:");
        if (code === "skitisking") {
            document.getElementById('dev-menu').style.display = 'block';
            toggleSettings(); // Close settings menu automatically
        } else if (code) {
            alert("ACCESS DENIED: INVALID CODE");
        }
    }

    // --- DEV CHEAT FUNCTIONS ---
    function cheatMult() {
        let boost = watts === 0 ? 1000 : watts * 1000;
        watts += boost; totalEver += boost; updateUI();
    }
    
    function cheatBuyAll() { 
        for(let i=0; i<catalog.length; i++) owned[i] += 10; 
        updateUI(); renderShop(); 
    }
    
    function cheatSellAll() { 
        for(let i=0; i<catalog.length; i++) owned[i] = Math.max(0, owned[i]-10); 
        updateUI(); renderShop(); 
    }

    function setShopMode(mode) {
        shopMode = mode;
        document.getElementById('mode-buy').classList.toggle('active', mode === 'buy');
        document.getElementById('mode-sell').classList.toggle('active', mode === 'sell');
        
        // Update the 1x/5x/10x button colors to match the mode
        const amts = [1, 5, 10];
        amts.forEach(amt => {
            let btn = document.getElementById('btn-' + amt + 'x');
            btn.className = `buy-btn ${buyAmount === amt ? 'active' : ''} mode-${mode}`;
        });
        
        renderShop();
        updateUI();
    }

    function setBuyAmount(amt) {
        buyAmount = amt;
        const amts = [1, 5, 10];
        amts.forEach(a => {
            let btn = document.getElementById('btn-' + a + 'x');
            if (a === amt) btn.classList.add('active');
            else btn.classList.remove('active');
        });
        renderShop();
        updateUI();
    }

    function getCost(base, rate, currentOwned, amountToBuy) {
        if (amountToBuy === 1) return Math.floor(base * Math.pow(rate, currentOwned));
        return Math.floor(base * Math.pow(rate, currentOwned) * (Math.pow(rate, amountToBuy) - 1) / (rate - 1));
    }

    function getSellValue(base, rate, currentOwned, amountToSell) {
        if (currentOwned < amountToSell) return 0;
        let originalCost;
        if (amountToSell === 1) {
            originalCost = base * Math.pow(rate, currentOwned - 1);
        } else {
            let k = currentOwned - amountToSell;
            originalCost = base * Math.pow(rate, k) * (Math.pow(rate, amountToSell) - 1) / (rate - 1);
        }
        return Math.floor(originalCost * 0.5); // 50% refund
    }

    function getMultiplier() { return 1 + rebirths; }

    function doClick(e) {
        let mult = getMultiplier();
        let basePPC = 1;
        catalog.forEach((u, i) => { if(u.type === "click") basePPC += (u.power * owned[i]); });
        
        let val = basePPC * mult;
        watts += val;
        totalEver += val;
        
        if(document.getElementById('anim-toggle').checked) {
            sparkEffect();
            document.getElementById('shake-target').classList.add('shake');
            setTimeout(() => document.getElementById('shake-target').classList.remove('shake'), 100);
        }

        let x, y;
        if(e) {
            x = e.clientX; y = e.clientY;
        } else {
            const rect = document.getElementById('core-img').getBoundingClientRect();
            x = rect.left + rect.width / 2;
            y = rect.top + rect.height / 2;
        }
        popEffect(x, y, val);
        updateUI();
    }

    function sparkEffect() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.strokeStyle = "#fff"; ctx.lineWidth = 2;
        ctx.beginPath();
        let x = window.innerWidth * 0.38, y = window.innerHeight * 0.5;
        ctx.moveTo(x,y);
        for(let i=0; i<6; i++){
            x += (Math.random()-0.5)*400; y += (Math.random()-0.5)*400;
            ctx.lineTo(x,y);
        }
        ctx.stroke();
        setTimeout(() => ctx.clearRect(0,0,canvas.width,canvas.height), 70);
    }

    function popEffect(x, y, v) {
        const p = document.createElement('div');
        p.className = 'pop'; p.style.left = (x - 20) + 'px'; p.style.top = y + 'px';
        p.innerText = "+" + format(v);
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 600);
    }

    function tick() {
        let mult = getMultiplier();
        let basePPS = 0;
        catalog.forEach((u, i) => { if(u.type === "auto") basePPS += (u.power * owned[i]); });
        
        let gain = (basePPS * mult) / 10;
        watts += gain;
        totalEver += gain;
        
        let nextLvl = 250 * Math.pow(level, 3);
        if (totalEver >= nextLvl) level++;
        
        updateUI(mult, basePPS);
    }

    function updateUI(mult, pps = 0) {
        if(!mult) mult = getMultiplier();
        document.getElementById('score-text').innerText = format(watts);
        document.getElementById('pps-text').innerText = format(pps * mult) + " WATTS / SEC";
        document.getElementById('stat-pps').innerText = format(pps * mult);
        document.getElementById('stat-mult').innerText = mult + "x";
        document.getElementById('level-num').innerText = level;
        
        let ppc = 1;
        catalog.forEach((u, i) => { if(u.type === "click") ppc += (u.power * owned[i]); });
        document.getElementById('stat-ppc').innerText = format(ppc * mult);

        let curReq = 250 * Math.pow(level-1, 3);
        let nxtReq = 250 * Math.pow(level, 3);
        let progress = ((totalEver - curReq) / (nxtReq - curReq)) * 100;
        document.getElementById('battery-fill').style.width = Math.min(100, progress) + "%";
        
        const rebirthBtn = document.getElementById('rebirth-btn');
        if(level >= 100) {
            rebirthBtn.className = "ready";
            rebirthBtn.innerText = "INITIATE REBIRTH";
        } else {
            rebirthBtn.className = "locked";
            rebirthBtn.innerText = "SYSTEM REBIRTH [LOCKED]";
        }
        
        const uiItems = document.querySelectorAll('.item');
        catalog.forEach((u, i) => {
            if (shopMode === 'buy') {
                let cost = getCost(u.cost, u.rate, owned[i], buyAmount);
                if(watts >= cost) uiItems[i].classList.remove('locked');
                else uiItems[i].classList.add('locked');
            } else {
                if(owned[i] >= buyAmount) uiItems[i].classList.remove('locked');
                else uiItems[i].classList.add('locked');
            }
        });
    }

    function shopAction(i) {
        if (shopMode === 'buy') {
            let cost = getCost(catalog[i].cost, catalog[i].rate, owned[i], buyAmount);
            if(watts >= cost) {
                watts -= cost;
                owned[i] += buyAmount;
                if(document.getElementById('sfx-toggle').checked) buySfx.play().catch(()=>{});
                renderShop();
                updateUI();
            }
        } else if (shopMode === 'sell') {
            if (owned[i] >= buyAmount) {
                let refund = getSellValue(catalog[i].cost, catalog[i].rate, owned[i], buyAmount);
                watts += refund;
                owned[i] -= buyAmount;
                renderShop();
                updateUI();
            }
        }
    }

    function renderShop() {
        const container = document.getElementById('upgrade-list');
        container.innerHTML = '';
        catalog.forEach((u, i) => {
            let el = document.createElement('div');
            
            if (shopMode === 'buy') {
                let cost = getCost(u.cost, u.rate, owned[i], buyAmount);
                el.className = `item ${watts < cost ? 'locked' : ''}`;
                el.onclick = () => shopAction(i);
                el.innerHTML = `
                    <div class="item-info">
                        <h4>${u.name} [Lv.${owned[i]}]</h4>
                        <p>${u.desc}</p>
                    </div>
                    <div class="item-cost-display">
                        <div style="color:var(--orange); font-weight:900;">${format(cost)}</div>
                        <span>BUY ${buyAmount}</span>
                    </div>
                `;
            } else {
                let refund = getSellValue(u.cost, u.rate, owned[i], buyAmount);
                el.className = `item sell-mode ${owned[i] < buyAmount ? 'locked' : ''}`;
                el.onclick = () => shopAction(i);
                el.innerHTML = `
                    <div class="item-info">
                        <h4 style="color:var(--green);">${u.name} [Lv.${owned[i]}]</h4>
                        <p>${u.desc}</p>
                    </div>
                    <div class="item-cost-display">
                        <div style="color:var(--green); font-weight:900;">+${format(refund)}</div>
                        <span>SELL ${buyAmount}</span>
                    </div>
                `;
            }
            container.appendChild(el);
        });
    }

    function prestige() {
        if(level < 100) return; 
        if(confirm(`WARNING: This will reset your power and subsystems.\nYour global multiplier will permanently increase to ${getMultiplier() + 1}x.\nProceed?`)) {
            rebirths++;
            watts = 0; totalEver = 0; level = 1;
            owned.fill(0);
            save();
            location.reload();
        }
    }

    function save() { localStorage.setItem('overdrive_save_hard', JSON.stringify({watts, totalEver, level, rebirths, owned})); }
    function load() {
        let d = JSON.parse(localStorage.getItem('overdrive_save_hard'));
        if(d) {
            watts = d.watts || 0; totalEver = d.totalEver || 0;
            level = d.level || 1; rebirths = d.rebirths || 0;
            owned = d.owned || owned;
        }
    }

    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    load();
    setInterval(tick, 100);
    setInterval(save, 5000);
    document.getElementById('core-btn').addEventListener('mousedown', (e) => doClick(e));
    window.addEventListener('keydown', (e) => { if(e.code === "Space") { e.preventDefault(); doClick(); }});
    renderShop();
</script>
</body>
</html>
